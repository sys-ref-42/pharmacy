// ═══ STATE ═══
let meds={},contacts={},tab="home",search="",filterCat="all",inStockOnly=false,selSym=null;
let form=null,editId=null,delId=null,editContact=null,ready=false;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function medsArr(){return Object.values(meds)}
function contactsArr(){return Object.values(contacts)}

function expInfo(d){
  if(!d)return{s:"unknown",l:"No date",c:"#9CA3AF"};
  const now=new Date(),e=new Date(d+"-01");e.setMonth(e.getMonth()+1);e.setDate(0);
  const diff=(e-now)/864e5;
  if(diff<0)return{s:"expired",l:"Expired",c:"#DC2626"};
  if(diff<90)return{s:"soon",l:Math.ceil(diff)+"d left",c:"#D97706"};
  const[y,m]=d.split("-");const mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return{s:"ok",l:mn[+m-1]+" "+y,c:"#16A34A"};
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

// ═══ FIREBASE LISTENERS ═══
medsRef.on("value",snap=>{
  const v=snap.val();
  if(v){meds=v}else{
    // First ever load: seed with pre-populated meds
    const seed={};
    PRE.forEach(m=>{const id=uid();seed[id]={id,name:m.n,cat:m.cat,exp:"",qty:0,unit:m.u,loc:"",notes:m.no}});
    medsRef.set(seed);
    meds=seed;
  }
  if(!ready){ready=true}
  render();
});
contactsRef.on("value",snap=>{
  const v=snap.val();
  if(v){contacts=v}else{contactsRef.set(DEF_CONTACTS);contacts=JSON.parse(JSON.stringify(DEF_CONTACTS))}

});

  document.querySelectorAll(".bn button")?.forEach(b=>{b.className=(b.id==="nav-"+tab||(tab==="form"&&b.id==="nav-cabinet"))?"on":""});

    h+=`<div class="g2" style="margin-bottom:12px">
      <div class="st" style="background:#ECFDF5"><div class="si">💊</div><div class="sv" style="color:#065F46">${inStock.length}</div><div class="sl">In Stock</div></div>
      <div class="st" style="background:${expired.length?"#FEF2F2":"#F9FAFB"}"><div class="si">⚠️</div><div class="sv" style="color:${expired.length?"#DC2626":"#9CA3AF"}">${expired.length}</div><div class="sl">Expired</div></div>
      <div class="st" style="background:${soon.length?"#FFFBEB":"#F9FAFB"}"><div class="si">⏰</div><div class="sv" style="color:${soon.length?"#D97706":"#9CA3AF"}">${soon.length}</div><div class="sl">Expiring Soon</div></div>
      <div class="st" style="background:#F9FAFB"><div class="si">📭</div><div class="sv" style="color:#9CA3AF">${oos.length}</div><div class="sl">Out of Stock</div></div></div>`;
    if(expired.length)h+=`<div class="ab" style="background:#FEF2F2;border:1px solid #FECACA"><div class="at" style="color:#DC2626">🚨 Expired</div>${expired.map(m=>`<div class="ar"><span style="color:#7F1D1D">${esc(m.name)}</span><span class="bd" style="background:#DC2626">${expInfo(m.exp).l}</span></div>`).join("")}</div>`;
    if(soon.length)h+=`<div class="ab" style="background:#FFFBEB;border:1px solid #FDE68A"><div class="at" style="color:#D97706">⏰ Expiring Soon</div>${soon.map(m=>`<div class="ar"><span style="color:#78350F">${esc(m.name)}</span><span class="bd" style="background:#D97706">${expInfo(m.exp).l}</span></div>`).join("")}</div>`;
    h+=`<div class="qs"><div style="font-weight:700;font-size:13px;color:#1E293B;margin-bottom:4px">🚀 Quick Start</div><div style="font-size:12px;color:#64748B;line-height:1.5">Common FR/IT medicines pre-loaded at <b>0 qty</b>. Go to <b>Cabinet</b>, bump up quantities, add expiry dates & locations. Delete what you don't need.</div></div>`;
  }

  // CABINET
  else if(tab==="cabinet"){
    let list=ma.slice();
    if(inStockOnly)list=list.filter(m=>m.qty>0);
    if(filterCat!=="all")list=list.filter(m=>m.cat===filterCat);
    if(search)list=list.filter(m=>m.name.toLowerCase().includes(search.toLowerCase())||m.loc?.toLowerCase().includes(search.toLowerCase())||m.notes?.toLowerCase().includes(search.toLowerCase()));
    list.sort((a,b)=>{if(!a.qty&&b.qty)return 1;if(a.qty&&!b.qty)return-1;return a.name.localeCompare(b.name)});
    h+=`<input class="sr" type="text" placeholder="Search..." value="${esc(search)}" oninput="search=this.value;render()" style="margin-bottom:7px">`;
    h+=`<div class="ps"><button class="pl ${inStockOnly?"on":""}" onclick="inStockOnly=!inStockOnly;render()">${inStockOnly?"✅ In stock":"All"}</button>`;
    Object.entries(CATS).forEach(([k,v])=>{const c=ma.filter(m=>m.cat===k&&(!inStockOnly||m.qty>0)).length;if(c)h+=`<button class="pl ${filterCat===k?"on":""}" style="${filterCat===k?"background:"+v.c+";border-color:"+v.c:""}" onclick="filterCat=filterCat==='${k}'?'all':'${k}';render()">${v.i}${c}</button>`});
    h+=`</div>`;
    if(!list.length)h+=`<div class="em"><div style="font-size:32px">🔍</div><div style="font-size:12px;margin-top:4px">No medicines found</div></div>`;
    else{h+=`<div style="font-size:10px;color:#94A3B8;margin-bottom:5px">${list.length} result${list.length>1?"s":""}</div>`;list.forEach(m=>h+=medCard(m))}
  }

  // GUIDE
  else if(tab==="guide"){
    if(!selSym){
      h+=`<div style="font-weight:700;font-size:15px;color:#1E293B;margin-bottom:2px">What's wrong?</div><div style="font-size:12px;color:#64748B;margin-bottom:10px">Tap a symptom → see what's in stock</div><div class="sg">`;
      SYMS.forEach(s=>{const av=ma.filter(m=>s.cats.includes(m.cat)&&m.qty>0).length;h+=`<button class="sb" onclick="selSym='${s.id}';render()"><div class="si">${s.i}</div><div class="sl">${s.l}</div><div class="sa" style="color:${av?"#16A34A":"#DC2626"}">${av?av+" available":"Nothing"}</div></button>`});
      h+=`</div>`;
    } else {
      const s=SYMS.find(x=>x.id===selSym),sm=ma.filter(m=>s.cats.includes(m.cat)&&m.qty>0);
      h+=`<button class="bb" onclick="selSym=null;render()">← Back</button>`;
      h+=`<div style="background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)"><div style="font-size:28px">${s.i}</div><h3 style="margin:3px 0 0;font-size:16px;font-weight:800;color:#1E293B">${s.l}</h3><div style="font-size:11px;color:#64748B;margin-top:2px">Looking in: ${s.cats.map(c=>CATS[c].l).join(", ")}</div></div>`;
      if(sm.length){h+=`<div style="font-weight:700;font-size:12px;color:#16A34A;margin-bottom:6px">✅ ${sm.length} available:</div>`;sm.forEach(m=>h+=medCard(m))}
      else h+=`<div style="background:#FEF2F2;border-radius:14px;padding:16px;text-align:center;border:1px solid #FECACA"><div style="font-size:28px;margin-bottom:4px">😕</div><div style="font-weight:700;color:#DC2626;margin-bottom:3px">Nothing in stock</div><div style="font-size:12px;color:#7F1D1D">Time to visit the pharmacy!</div></div>`;
    }
  }

  // CONTACTS
  else if(tab==="contacts"){
    const ca=contactsArr();
    h+=`<div style="font-weight:700;font-size:15px;color:#1E293B;margin-bottom:2px">Important Contacts</div><div style="font-size:12px;color:#64748B;margin-bottom:10px">Pharmacies, vets & emergency numbers</div>`;
    h+=`<div style="font-weight:700;font-size:12px;color:#065F46;margin-bottom:6px">🏥 Pharmacies</div>`;
    ca.filter(c=>c.type==="pharmacy").forEach(c=>h+=contactCard(c));
    h+=`<div style="font-weight:700;font-size:12px;color:#A855F7;margin-bottom:6px;margin-top:14px">🐾 Milo — Vet</div>`;
    ca.filter(c=>c.type==="vet").forEach(c=>h+=contactCard(c));
    h+=`<div style="background:#FEF2F2;border-radius:14px;padding:12px;margin-top:14px;border:1px solid #FECACA;text-align:center"><div style="font-weight:700;font-size:13px;color:#DC2626;margin-bottom:2px">🚨 Emergency</div><div><a href="tel:118" style="color:#DC2626;font-weight:800;font-size:18px;text-decoration:none">118</a><span style="margin:0 8px;opacity:.3">|</span><a href="tel:112" style="color:#DC2626;font-weight:800;font-size:18px;text-decoration:none">112</a></div><div style="font-size:10px;color:#9CA3AF;margin-top:3px">Medical · General Emergency</div></div>`;
  }

  // FORM
  else if(tab==="form"&&form){
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h2 style="font-size:16px;font-weight:800;color:#1E293B">${editId?"Edit Medicine":"Add Medicine"}</h2><button onclick="form=null;go('cabinet')" style="background:none;border:none;font-size:12px;color:#64748B;cursor:pointer;font-weight:600;font-family:inherit">Cancel</button></div>`;
    h+=`<div class="fg"><label>Name *</label><input id="f-name" value="${esc(form.name)}" oninput="form.name=this.value" placeholder="e.g. Efferalgan, Doliprane..."></div>`;
    h+=`<div class="fg"><label>Category</label><div class="cg">`;
    Object.entries(CATS).forEach(([k,v])=>{h+=`<button class="cb2 ${form.cat===k?"on":""}" style="--c:${v.c}" onclick="form.cat='${k}';render()">${v.i} ${v.l}</button>`});
    h+=`</div></div>`;
    h+=`<div class="g2" style="gap:10px"><div class="fg"><label>Expiry</label><input type="month" value="${form.exp||""}" onchange="form.exp=this.value"></div>`;
    h+=`<div class="fg"><label>Quantity</label><div style="display:flex;align-items:center;gap:4px"><button class="qb" style="width:32px;height:32px" onclick="form.qty=Math.max(0,form.qty-1);render()">−</button><input type="number" value="${form.qty}" min="0" onchange="form.qty=Math.max(0,+this.value||0)" style="width:44px;text-align:center;padding:5px 3px;border-radius:9px;border:1.5px solid #D1D5DB;font-size:13px;font-family:inherit"><button class="qb" style="width:32px;height:32px" onclick="form.qty++;render()">+</button></div></div></div>`;
    h+=`<div class="fg"><label>Unit</label><div class="ur">${UNITS.map(u=>`<button class="ch ${form.unit===u?"on":""}" onclick="form.unit='${u}';render()">${u}</button>`).join("")}</div></div>`;
    h+=`<div class="fg"><label>📍 Location</label><div class="ur">${LOCS.map(l=>`<button class="ch ${form.loc===l?"on":""}" onclick="form.loc='${esc(l)}';render()">${l}</button>`).join("")}</div><input value="${esc(form.loc)}" oninput="form.loc=this.value" placeholder="Or type custom..." style="margin-top:4px;font-size:12px;width:100%;padding:8px 10px;border-radius:9px;border:1.5px solid #D1D5DB;font-family:inherit"></div>`;
    h+=`<div class="fg"><label>Notes</label><textarea oninput="form.notes=this.value" placeholder="Dosage, instructions..." rows="2">${esc(form.notes)}</textarea></div>`;
    h+=`<button class="sv2" onclick="handleSave()" ${form.name.trim()?"":"disabled"}>${editId?"💾 Save":"✅ Add Medicine"}</button>`;
  }

  h+=`</div>`;

  // Nav
  h+=`<div class="bn">${[{id:"home",i:"🏠",l:"Home"},{id:"cabinet",i:"🗄️",l:"Cabinet"},{id:"guide",i:"🩺",l:"Health"},{id:"contacts",i:"📍",l:"Contacts"}].map(t=>`<button id="nav-${t.id}" class="${(tab===t.id||(t.id==="cabinet"&&tab==="form"))?"on":""}" onclick="go('${t.id}')"><span class="ni">${t.i}</span><span class="nl">${t.l}</span></button>`).join("")}</div>`;

  // Delete modal
  if(delId){
    const m=meds[delId];
    h+=`<div class="mbg" onclick="delId=null;render()"><div class="mdl" onclick="event.stopPropagation()"><div style="font-size:28px;margin-bottom:4px">🗑️</div><div style="font-weight:700;font-size:14px;margin-bottom:2px">Delete?</div><div style="font-size:12px;color:#64748B;margin-bottom:12px">${m?esc(m.name):""}</div><div style="display:flex;gap:8px"><button class="mb" style="border:1.5px solid #D1D5DB;background:#fff" onclick="delId=null;render()">Cancel</button><button class="mb" style="border:none;background:#DC2626;color:#fff" onclick="confirmDel()">Delete</button></div></div></div>`;
  }

  document.getElementById("root").innerHTML=h;
}

function medCard(m){
  const cat=CATS[m.cat]||CATS.other,e=expInfo(m.exp);
  return`<div class="cd ${m.qty===0?"ot":""}" style="border-left-color:${cat.c}"><div class="ci">${cat.i}</div><div style="flex:1;min-width:0"><div class="cn">${esc(m.name)}</div><div class="cb">${`<span class="bd" style="background:${e.c}">${e.l}</span>`}${m.loc?`<span class="bd bg">📍 ${esc(m.loc)}</span>`:""}${m.qty===0?`<span class="bd" style="background:#DC2626">OUT</span>`:""}</div>${m.notes?`<div class="cno">${esc(m.notes)}</div>`:""}</div><div class="ca"><div class="qr"><button class="qb" onclick="chgQty('${m.id}',-1)">−</button><span class="qv">${m.qty}</span><button class="qb" onclick="chgQty('${m.id}',1)">+</button></div><div style="display:flex;gap:6px"><button class="ib" onclick="openEdit('${m.id}')">✏️</button><button class="ib" onclick="delId='${m.id}';render()">🗑️</button></div></div></div>`;
}

function contactCard(c){
  if(editContact===c.id){
    return`<div class="cc" style="border:2px solid #0D9488"><div style="font-weight:700;font-size:13px;color:#1E293B;margin-bottom:8px">${c.label}</div>${["name","address","phone","notes"].map(f=>`<div class="fg"><label style="text-transform:capitalize">${f}</label><input id="ce-${f}" value="${esc(c[f])}" placeholder="${f==="name"?"e.g. Farmacia Centrale":f==="phone"?"+39 06 ...":f==="address"?"Via Roma 1, Rome":"Notes..."}"></div>`).join("")}<div style="display:flex;gap:6px"><button style="flex:1;padding:9px;border-radius:10px;background:#065F46;color:#fff;border:none;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px" onclick="saveContact('${c.id}')">Save</button><button style="padding:9px;border-radius:10px;background:#F1F5F9;border:none;font-weight:600;cursor:pointer;font-family:inherit;font-size:12px;color:#64748B" onclick="editContact=null;render()">Cancel</button></div></div>`;
  }
  const empty=!c.name&&!c.address&&!c.phone;
  return`<div class="cc ${c.h24?"h4":"rg"}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-weight:700;font-size:13px;color:#1E293B;margin-bottom:2px">${c.label}</div>${empty?`<div style="font-size:12px;color:#94A3B8;font-style:italic">Tap ✏️ to add details</div>`:`${c.name?`<div style="font-size:13px;font-weight:600;color:#334155">${esc(c.name)}</div>`:""}${c.address?`<div style="font-size:12px;color:#64748B;margin-top:2px">📍 ${esc(c.address)}</div>`:""}${c.phone?`<a href="tel:${esc(c.phone)}" style="font-size:14px;color:#0D9488;font-weight:700;margin-top:4px;display:inline-block;text-decoration:none">📞 ${esc(c.phone)}</a>`:""}${c.notes?`<div style="font-size:11px;color:#94A3B8;margin-top:2px">${esc(c.notes)}</div>`:""}`}</div><button class="ib" onclick="editContact='${c.id}';render()">✏️</button></div></div>`;
}

// ═══ ACTIONS ═══
function go(t){tab=t;selSym=null;render()}
function chgQty(id,d){const m=meds[id];if(m){m.qty=Math.max(0,(m.qty||0)+d);medsRef.child(id).update({qty:m.qty})}}
function openAdd(){form={name:"",cat:"pain_fever",exp:"",qty:1,unit:"box",loc:"",notes:""};editId=null;tab="form";render()}
function openEdit(id){const m=meds[id];if(m){form={...m};editId=id;tab="form";render()}}
function handleSave(){
  if(!form.name.trim())return;
  if(editId){medsRef.child(editId).set({...form,id:editId})}
  else{const id=uid();medsRef.child(id).set({...form,id,qty:form.qty||0})}
  form=null;editId=null;tab="cabinet";
}
function confirmDel(){medsRef.child(delId).remove();delId=null}
function saveContact(id){
  const upd={};
  ["name","address","phone","notes"].forEach(f=>{const el=document.getElementById("ce-"+f);if(el)upd[f]=el.value});
  contactsRef.child(id).update(upd);
  editContact=null;
}
</script>
</body>
</html>
