function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function medsArr(){return Object.values(meds)}
function contactsArr(){return Object.values(contacts)}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function expInfo(d){
  if(!d)return{s:"unknown",l:"No date",c:"#9CA3AF"};
  var now=new Date();
  var e=new Date(d+"-01");
  e.setMonth(e.getMonth()+1);
  e.setDate(0);
  var diff=(e-now)/864e5;
  if(diff<0)return{s:"expired",l:"Expired",c:"#DC2626"};
  if(diff<90)return{s:"soon",l:Math.ceil(diff)+"d left",c:"#D97706"};
  var parts=d.split("-");
  var mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return{s:"ok",l:mn[parseInt(parts[1])-1]+" "+parts[0],c:"#16A34A"};
}

// ═══ FIREBASE LISTENERS ═══
medsRef.on("value",function(snap){
  var v=snap.val();
  if(v){meds=v}else{
    var seed={};
    PRE.forEach(function(m){var id=uid();seed[id]={id:id,name:m.n,cat:m.cat,exp:"",qty:0,unit:m.u,loc:"",notes:m.no}});
    medsRef.set(seed);
    meds=seed;
  }
  ready=true;
  render();
});
contactsRef.on("value",function(snap){
  var v=snap.val();
  if(v){contacts=v}else{contactsRef.set(DEF_CONTACTS);contacts=JSON.parse(JSON.stringify(DEF_CONTACTS))}
  render();
});

// ═══ RENDER ═══
function render(){
  try{
  if(!ready)return;
  var ma=medsArr();
  var inStock=ma.filter(function(m){return m.qty>0});
  var expired=ma.filter(function(m){return m.qty>0&&expInfo(m.exp).s==="expired"});
  var soon=ma.filter(function(m){return m.qty>0&&expInfo(m.exp).s==="soon"});
  var oos=ma.filter(function(m){return m.qty===0});
  var h="";

  // HEADER
  h+='<div class="hdr"><div><h1>&#10010; Home Pharmacy</h1><small><span class="sync-dot" style="background:#22C55E"></span>'+inStock.length+' in stock &middot; '+ma.length+' total</small></div><button class="btn-add" onclick="openAdd()">+ Add</button></div>';
  h+='<div class="ct">';

  // ─── HOME ───
  if(tab==="home"){
    h+='<div class="g2" style="margin-bottom:12px">';
    h+='<div class="st" style="background:#ECFDF5"><div style="font-size:20px">&#x1F48A;</div><div style="font-size:20px;font-weight:800;color:#065F46">'+inStock.length+'</div><div style="font-size:10px;color:#64748B;font-weight:500">In Stock</div></div>';
    h+='<div class="st" style="background:'+(expired.length?"#FEF2F2":"#F9FAFB")+'"><div style="font-size:20px">&#x26A0;&#xFE0F;</div><div style="font-size:20px;font-weight:800;color:'+(expired.length?"#DC2626":"#9CA3AF")+'">'+expired.length+'</div><div style="font-size:10px;color:#64748B;font-weight:500">Expired</div></div>';
    h+='<div class="st" style="background:'+(soon.length?"#FFFBEB":"#F9FAFB")+'"><div style="font-size:20px">&#x23F0;</div><div style="font-size:20px;font-weight:800;color:'+(soon.length?"#D97706":"#9CA3AF")+'">'+soon.length+'</div><div style="font-size:10px;color:#64748B;font-weight:500">Expiring Soon</div></div>';
    h+='<div class="st" style="background:#F9FAFB"><div style="font-size:20px">&#x1F4ED;</div><div style="font-size:20px;font-weight:800;color:#9CA3AF">'+oos.length+'</div><div style="font-size:10px;color:#64748B;font-weight:500">Out of Stock</div></div>';
    h+='</div>';
    if(expired.length){
      h+='<div class="ab" style="background:#FEF2F2;border:1px solid #FECACA"><div class="at" style="color:#DC2626">&#x1F6A8; Expired</div>';
      expired.forEach(function(m){h+='<div class="ar"><span style="color:#7F1D1D">'+esc(m.name)+'</span><span class="bd" style="background:#DC2626">'+expInfo(m.exp).l+'</span></div>'});
      h+='</div>';
    }
    if(soon.length){

      h+='</div>';
    }
    h+='<div class="qs"><div style="font-weight:700;font-size:13px;color:#1E293B;margin-bottom:4px">&#x1F680; Quick Start</div><div style="font-size:12px;color:#64748B;line-height:1.5">Common FR/IT medicines pre-loaded at <b>0 qty</b>. Go to <b>Cabinet</b>, bump up quantities, add expiry dates &amp; locations.</div></div>';
  }

  // ─── CABINET ───
  else if(tab==="cabinet"){
    var list=ma.slice();
    if(inStockOnly)list=list.filter(function(m){return m.qty>0});
    if(filterCat!=="all")list=list.filter(function(m){return m.cat===filterCat});
    if(search)list=list.filter(function(m){var s=search.toLowerCase();return m.name.toLowerCase().indexOf(s)>=0||(m.loc||"").toLowerCase().indexOf(s)>=0||(m.notes||"").toLowerCase().indexOf(s)>=0});
    list.sort(function(a,b){if(!a.qty&&b.qty)return 1;if(a.qty&&!b.qty)return-1;return a.name.localeCompare(b.name)});
    h+='<input class="sr" type="text" placeholder="Search..." value="'+esc(search)+'" oninput="updateSearch(this.value)" style="margin-bottom:7px">';
    h+='<div class="ps"><button class="pl '+(inStockOnly?"on":"")+'" onclick="toggleStock()">'+(inStockOnly?"&#x2705; In stock":"All")+'</button>';
    var catKeys=Object.keys(CATS);
    catKeys.forEach(function(k){var v=CATS[k];var c=ma.filter(function(m){return m.cat===k&&(!inStockOnly||m.qty>0)}).length;if(c)h+='<button class="pl '+(filterCat===k?"on":"")+'" style="'+(filterCat===k?"background:"+v.c+";border-color:"+v.c:"")+'" onclick="setFilter(\''+k+'\')">'+v.i+c+'</button>'});
    h+='</div>';
    if(!list.length){h+='<div style="text-align:center;padding:24px;color:#94A3B8"><div style="font-size:32px">&#x1F50D;</div><div style="font-size:12px;margin-top:4px">No medicines found</div></div>'}
    else{h+='<div style="font-size:10px;color:#94A3B8;margin-bottom:5px">'+list.length+' result'+(list.length>1?"s":"")+'</div>';list.forEach(function(m){h+=medCard(m)})}
  }

  // ─── GUIDE ───
  else if(tab==="guide"){
    if(!selSym){
      h+='<div style="font-weight:700;font-size:15px;color:#1E293B;margin-bottom:2px">What\'s wrong?</div><div style="font-size:12px;color:#64748B;margin-bottom:10px">Tap a symptom</div><div class="sg">';
      SYMS.forEach(function(s){var av=ma.filter(function(m){return s.cats.indexOf(m.cat)>=0&&m.qty>0}).length;h+='<button class="sb" onclick="pickSym(\''+s.id+'\')"><div style="font-size:22px;margin-bottom:2px">'+s.i+'</div><div style="font-weight:600;font-size:11px;color:#1E293B">'+s.l+'</div><div style="font-size:10px;font-weight:500;margin-top:1px;color:'+(av?"#16A34A":"#DC2626")+'">'+(av?av+" available":"Nothing")+'</div></button>'});
      h+='</div>';
    } else {
      var sym=null;
      SYMS.forEach(function(s){if(s.id===selSym)sym=s});
      if(!sym){selSym=null;render();return}
      var sm=ma.filter(function(m){return sym.cats.indexOf(m.cat)>=0&&m.qty>0});
      h+='<button class="bb" onclick="backSym()">&larr; Back</button>';
      h+='<div style="background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)"><div style="font-size:28px">'+sym.i+'</div><h3 style="margin:3px 0 0;font-size:16px;font-weight:800;color:#1E293B">'+sym.l+'</h3><div style="font-size:11px;color:#64748B;margin-top:2px">Looking in: '+sym.cats.map(function(c){return CATS[c].l}).join(", ")+'</div></div>';
      if(sm.length){h+='<div style="font-weight:700;font-size:12px;color:#16A34A;margin-bottom:6px">&#x2705; '+sm.length+' available:</div>';sm.forEach(function(m){h+=medCard(m)})}
      else{h+='<div style="background:#FEF2F2;border-radius:14px;padding:16px;text-align:center;border:1px solid #FECACA"><div style="font-size:28px;margin-bottom:4px">&#x1F615;</div><div style="font-weight:700;color:#DC2626;margin-bottom:3px">Nothing in stock</div><div style="font-size:12px;color:#7F1D1D">Time to visit the pharmacy!</div></div>'}
    }
  }

  // ─── CONTACTS ───
  else if(tab==="contacts"){
    var ca=contactsArr();
    h+='<div style="font-weight:700;font-size:15px;color:#1E293B;margin-bottom:2px">Important Contacts</div><div style="font-size:12px;color:#64748B;margin-bottom:10px">Pharmacies, vets &amp; emergency</div>';
    h+='<div style="font-weight:700;font-size:12px;color:#065F46;margin-bottom:6px">&#x1F3E5; Pharmacies</div>';
    ca.forEach(function(c){if(c.type==="pharmacy")h+=contactCard(c)});
    h+='<div style="font-weight:700;font-size:12px;color:#A855F7;margin-bottom:6px;margin-top:14px">&#x1F43E; Milo &mdash; Vet</div>';
    ca.forEach(function(c){if(c.type==="vet")h+=contactCard(c)});
    h+='<div style="background:#FEF2F2;border-radius:14px;padding:12px;margin-top:14px;border:1px solid #FECACA;text-align:center"><div style="font-weight:700;font-size:13px;color:#DC2626;margin-bottom:2px">&#x1F6A8; Emergency</div><div><a href="tel:118" style="color:#DC2626;font-weight:800;font-size:18px;text-decoration:none">118</a><span style="margin:0 8px;opacity:.3">|</span><a href="tel:112" style="color:#DC2626;font-weight:800;font-size:18px;text-decoration:none">112</a></div><div style="font-size:10px;color:#9CA3AF;margin-top:3px">Medical &middot; General</div></div>';
  }

  // ─── FORM ───
  else if(tab==="form"&&form){
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h2 style="font-size:16px;font-weight:800;color:#1E293B">'+(editId?"Edit Medicine":"Add Medicine")+'</h2><button onclick="cancelForm()" style="background:none;border:none;font-size:12px;color:#64748B;cursor:pointer;font-weight:600;font-family:inherit">Cancel</button></div>';

    // Name
    h+='<div class="fg"><label>Name *</label><input value="'+esc(form.name)+'" oninput="updateFormName(this.value)" placeholder="e.g. Efferalgan, Doliprane..."></div>';

    // Category
    h+='<div class="fg"><label>Category</label><div class="cg">';
    var catKeys2=Object.keys(CATS);
    catKeys2.forEach(function(k){
      var v=CATS[k];
      var isOn=form.cat===k;
      h+='<button class="catbtn" style="border-color:'+(isOn?v.c:"#E5E7EB")+';color:'+(isOn?v.c:"#64748B")+';background:'+(isOn?v.c+"15":"#fff")+'" onclick="setCat(\''+k+'\')">'+v.i+' '+v.l+'</button>';
    });
    h+='</div></div>';

    // Expiry + Qty
    h+='<div class="g2" style="gap:10px"><div class="fg"><label>Expiry</label><input type="month" value="'+(form.exp||"")+'" onchange="updateFormExp(this.value)"></div>';
    h+='<div class="fg"><label>Quantity</label><div style="display:flex;align-items:center;gap:4px"><button class="qb2" onclick="formQtyDown()">&minus;</button><input type="number" value="'+form.qty+'" min="0" onchange="updateFormQtyInput(this.value)" style="width:44px;text-align:center;padding:5px 3px;border-radius:9px;border:1.5px solid #D1D5DB;font-size:13px;font-family:inherit"><button class="qb2" onclick="formQtyUp()">+</button></div></div></div>';

    // Unit
    h+='<div class="fg"><label>Unit</label><div class="ur">';
    UNITS.forEach(function(u){h+='<button class="chip'+(form.unit===u?" on":"")+'" onclick="setUnit(\''+u+'\')">'+u+'</button>'});
    h+='</div></div>';

    // Location
    h+='<div class="fg"><label>&#x1F4CD; Location</label><div class="ur">';
    LOCS.forEach(function(l){h+='<button class="chip'+(form.loc===l?" on":"")+'" onclick="setLoc(\''+esc(l)+'\')">'+esc(l)+'</button>'});
    h+='</div><input value="'+esc(form.loc)+'" oninput="updateFormLoc(this.value)" placeholder="Or type custom..." style="margin-top:4px;font-size:12px;width:100%;padding:8px 10px;border-radius:9px;border:1.5px solid #D1D5DB;font-family:inherit;box-sizing:border-box"></div>';

    // Notes
    h+='<div class="fg"><label>Notes</label><textarea oninput="updateFormNotes(this.value)" placeholder="Dosage, instructions..." rows="2">'+esc(form.notes)+'</textarea></div>';

    // Save
    var canSave=form.name.trim().length>0;
    h+='<button id="save-btn" class="svbtn" onclick="handleSave()" '+(canSave?"":"disabled")+' style="background:'+(canSave?"linear-gradient(135deg,#065F46,#0D9488)":"#D1D5DB")+';box-shadow:'+(canSave?"0 4px 12px rgba(13,148,136,.3)":"none")+'">'+(editId?"&#x1F4BE; Save":"&#x2705; Add Medicine")+'</button>';
  }

  h+='</div>'; // close .ct

  // NAV
  h+='<div class="bn">';
  [{id:"home",i:"&#x1F3E0;",l:"Home"},{id:"cabinet",i:"&#x1F5C4;&#xFE0F;",l:"Cabinet"},{id:"guide",i:"&#x1FA7A;",l:"Health"},{id:"contacts",i:"&#x1F4CD;",l:"Contacts"}].forEach(function(t){
    var isOn=tab===t.id||(t.id==="cabinet"&&tab==="form");
    h+='<button class="'+(isOn?"on":"")+'" onclick="go(\''+t.id+'\')"><span class="ni">'+t.i+'</span><span class="nl">'+t.l+'</span></button>';
  });
  h+='</div>';

  // DELETE MODAL
  if(delId){
    var dm=meds[delId];
    h+='<div class="mbg" onclick="cancelDel()"><div class="mdl" onclick="event.stopPropagation()"><div style="font-size:28px;margin-bottom:4px">&#x1F5D1;&#xFE0F;</div><div style="font-weight:700;font-size:14px;margin-bottom:2px">Delete?</div><div style="font-size:12px;color:#64748B;margin-bottom:12px">'+(dm?esc(dm.name):"")+'</div><div style="display:flex;gap:8px"><button class="mb" style="border:1.5px solid #D1D5DB;background:#fff" onclick="cancelDel()">Cancel</button><button class="mb" style="border:none;background:#DC2626;color:#fff" onclick="confirmDel()">Delete</button></div></div></div>';
  }

  document.getElementById("app").innerHTML=h;
  }catch(e){console.error("Render error:",e)}
}

function medCard(m){
  var cat=CATS[m.cat]||CATS.other;
  var e=expInfo(m.exp);
  var h='<div class="cd'+(m.qty===0?" ot":"")+'" style="border-left-color:'+cat.c+'">';
  h+='<div style="font-size:22px;width:28px;text-align:center;flex-shrink:0">'+cat.i+'</div>';
  h+='<div style="flex:1;min-width:0">';
  h+='<div style="font-weight:700;font-size:13px;color:#1E293B;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(m.name)+'</div>';
  h+='<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">';
  h+='<span class="bd" style="background:'+e.c+'">'+e.l+'</span>';
  if(m.loc)h+='<span class="bd bg">&#x1F4CD; '+esc(m.loc)+'</span>';
  if(m.qty===0)h+='<span class="bd" style="background:#DC2626">OUT</span>';
  h+='</div>';
  if(m.notes)h+='<div style="font-size:10px;color:#94A3B8;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(m.notes)+'</div>';
  h+='</div>';
  h+='<div style="display:flex;flex-direction:column;gap:3px;align-items:center;flex-shrink:0">';
  h+='<div style="display:flex;gap:2px;align-items:center"><button class="qb" onclick="chgQty(\''+m.id+'\',-1)">&minus;</button><span style="width:20px;text-align:center;font-weight:700;font-size:13px;color:#1E293B">'+m.qty+'</span><button class="qb" onclick="chgQty(\''+m.id+'\',1)">+</button></div>';
  h+='<div style="display:flex;gap:6px"><button class="ib" onclick="openEdit(\''+m.id+'\')">&#x270F;&#xFE0F;</button><button class="ib" onclick="askDel(\''+m.id+'\')">&#x1F5D1;&#xFE0F;</button></div>';
  h+='</div></div>';
  return h;
}

function contactCard(c){
  if(editContact===c.id){
    var h='<div class="cc" style="border:2px solid #0D9488"><div style="font-weight:700;font-size:13px;color:#1E293B;margin-bottom:8px">'+c.label+'</div>';
    ["name","address","phone","notes"].forEach(function(f){
      h+='<div class="fg"><label style="text-transform:capitalize">'+f+'</label><input id="ce-'+f+'" value="'+esc(c[f])+'" placeholder="'+(f==="name"?"e.g. Farmacia Centrale":f==="phone"?"+39 06 ...":f==="address"?"Via Roma 1, Rome":"Notes...")+'"></div>';
    });
    h+='<div style="display:flex;gap:6px"><button style="flex:1;padding:9px;border-radius:10px;background:#065F46;color:#fff;border:none;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px" onclick="saveCon(\''+c.id+'\')">Save</button><button style="padding:9px;border-radius:10px;background:#F1F5F9;border:none;font-weight:600;cursor:pointer;font-family:inherit;font-size:12px;color:#64748B" onclick="cancelCon()">Cancel</button></div></div>';
    return h;
  }
  var empty=!c.name&&!c.address&&!c.phone;
  var h='<div class="cc '+(c.h24?"h4":"rg")+'"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-weight:700;font-size:13px;color:#1E293B;margin-bottom:2px">'+c.label+'</div>';
  if(empty){h+='<div style="font-size:12px;color:#94A3B8;font-style:italic">Tap &#x270F;&#xFE0F; to add details</div>'}
  else{
    if(c.name)h+='<div style="font-size:13px;font-weight:600;color:#334155">'+esc(c.name)+'</div>';
    if(c.address)h+='<div style="font-size:12px;color:#64748B;margin-top:2px">&#x1F4CD; '+esc(c.address)+'</div>';
    if(c.phone)h+='<a href="tel:'+esc(c.phone)+'" style="font-size:14px;color:#0D9488;font-weight:700;margin-top:4px;display:inline-block;text-decoration:none">&#x1F4DE; '+esc(c.phone)+'</a>';
    if(c.notes)h+='<div style="font-size:11px;color:#94A3B8;margin-top:2px">'+esc(c.notes)+'</div>';
  }
  h+='</div><button class="ib" onclick="editCon(\''+c.id+'\')">&#x270F;&#xFE0F;</button></div></div>';
  return h;
}
</script>
</body>
</html>
